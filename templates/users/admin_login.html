{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Aegis.AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #121212; color: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
    .admin-login-card { background: #1e1e1e; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
    .admin-login-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; text-align: center; }
    .admin-login-subtitle { font-size: 0.9rem; color: #aaa; text-align: center; margin-bottom: 30px; }
    .form-control { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 12px; }
    .form-control:focus { background: #333; border-color: #0d6efd; color: #fff; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25); }
    .btn-admin { background: #0d6efd; color: #fff; padding: 12px; font-weight: 600; width: 100%; border: none; border-radius: 6px; margin-top: 20px; transition: 0.2s; }
    .btn-admin:hover { background: #0b5ed7; }
    .text-danger { color: #ff6b6b !important; }
  </style>
</head>
<body>

<div class="admin-login-card">
  <div class="text-center mb-4 text-primary">
    <i class="bi bi-shield-lock-fill" style="font-size: 3rem;"></i>
  </div>
  <h2 class="admin-login-title">Aegis.AI Admin</h2>
  <p class="admin-login-subtitle">Secure Portal Access</p>

  {% if messages %}
    {% for message in messages %}
    <div class="alert alert-danger py-2 small">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post" action="{% url 'admin_login' %}">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label text-secondary small text-uppercase fw-bold">Administrator Email</label>
      <input type="email" class="form-control" name="email" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label text-secondary small text-uppercase fw-bold">Password</label>
      <input type="password" class="form-control" name="password" required>
    </div>
    <button type="submit" class="btn-admin">Authenticate</button>
  </form>
</div>

</body>
</html>
