{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Email – Aegis.AI</title>
  <meta name="description" content="Verify your email address for Aegis.AI."/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
  <style>
    html,body{height:100%;margin:0;padding:0;background:var(--bg)}
    .verify-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .verify-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);max-width:440px;width:100%;overflow:hidden}
    .verify-header{background:linear-gradient(135deg,var(--primary),var(--primary-l));padding:2.5rem 2rem;text-align:center}
    .verify-header-icon{width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);display:inline-flex;align-items:center;justify-content:center;font-size:1.8rem;color:#fff;margin-bottom:1rem}
    .verify-header h2{color:#fff;font-size:1.5rem;font-weight:700;margin:0}
    .verify-header p{color:rgba(255,255,255,0.8);font-size:0.88rem;margin-top:6px}
    .verify-body{padding:2rem}
    .email-display{background:var(--bg-1);border:1px solid var(--border);border-radius:8px;padding:0.7rem 1rem;text-align:center;font-size:0.88rem;color:var(--text);font-weight:500;margin-bottom:1.5rem}
    .email-display i{color:var(--primary);margin-right:6px}

    .otp-inputs{display:flex;gap:8px;justify-content:center;margin-bottom:1.5rem}
    .otp-input{width:48px;height:56px;text-align:center;font-size:1.5rem;font-weight:700;font-family:'JetBrains Mono',monospace;background:var(--bg-1);border:2px solid var(--border);border-radius:10px;color:var(--text);outline:none;transition:all 0.15s ease}
    .otp-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-g)}
    .otp-input.filled{border-color:var(--success);background:var(--success-g)}

    .btn-auth{width:100%;padding:0.75rem;font-size:0.9rem;background:var(--primary);color:#fff;border-radius:8px;border:none;font-weight:600;cursor:pointer;transition:all 0.15s ease}
    .btn-auth:hover{background:var(--primary-d)}
    .btn-auth:disabled{opacity:0.6;cursor:not-allowed}

    .resend-section{text-align:center;margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border)}
    .resend-text{font-size:0.82rem;color:var(--text-3)}
    .resend-link{color:var(--primary);text-decoration:none;font-weight:600;font-size:0.82rem}
    .resend-link:hover{text-decoration:underline}

    .timer-badge{display:inline-flex;align-items:center;gap:4px;background:var(--warning-g);color:var(--warning);padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;margin-top:8px}

    .back-link{display:block;text-align:center;margin-top:1.25rem;font-size:0.82rem;color:var(--text-3);text-decoration:none}
    .back-link:hover{color:var(--primary)}

    .alert-danger{background:var(--danger-g);border:1px solid transparent;color:var(--danger);border-radius:8px}
    .alert-success{background:var(--success-g);border:1px solid transparent;color:var(--success);border-radius:8px}
    .alert-warning{background:var(--warning-g);border:1px solid transparent;color:var(--warning);border-radius:8px}

    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn 0.5s ease forwards}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
    .shake-animation{animation:shake 0.4s ease}
  </style>
</head>
<body>

<div class="verify-page">
  <div class="verify-card fade-in">

    <!-- Header -->
    <div class="verify-header">
      <div class="verify-header-icon">
        <i class="bi bi-envelope-check-fill"></i>
      </div>
      <h2>Verify Your Email</h2>
      <p>We've sent a 6-digit code to your inbox</p>
    </div>

    <!-- Body -->
    <div class="verify-body">

      {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{% if 'error' in message.tags or 'danger' in message.tags %}danger{% elif 'success' in message.tags %}success{% else %}warning{% endif %} shake-animation d-flex align-items-center gap-2 mb-3 py-2 small" role="alert">
          <i class="bi bi-{% if 'error' in message.tags or 'danger' in message.tags %}exclamation-triangle-fill{% elif 'success' in message.tags %}check-circle-fill{% else %}exclamation-circle-fill{% endif %}"></i>{{ message }}
        </div>
        {% endfor %}
      {% endif %}

      <!-- Email display -->
      <div class="email-display">
        <i class="bi bi-envelope-fill"></i>{{ email }}
      </div>

      <!-- OTP Form -->
      <form method="post" action="{% url 'verify_otp' %}" id="otp-form">
        {% csrf_token %}
        <input type="hidden" name="otp" id="otp-hidden"/>

        <!-- Individual OTP digit inputs -->
        <div class="otp-inputs">
          <input type="text" class="otp-input" maxlength="1" data-index="0" inputmode="numeric" pattern="[0-9]" autofocus/>
          <input type="text" class="otp-input" maxlength="1" data-index="1" inputmode="numeric" pattern="[0-9]"/>
          <input type="text" class="otp-input" maxlength="1" data-index="2" inputmode="numeric" pattern="[0-9]"/>
          <input type="text" class="otp-input" maxlength="1" data-index="3" inputmode="numeric" pattern="[0-9]"/>
          <input type="text" class="otp-input" maxlength="1" data-index="4" inputmode="numeric" pattern="[0-9]"/>
          <input type="text" class="otp-input" maxlength="1" data-index="5" inputmode="numeric" pattern="[0-9]"/>
        </div>

        <button type="submit" class="btn-auth" id="verify-btn">
          <i class="bi bi-check-circle-fill me-2"></i>Verify Email
        </button>
      </form>

      <!-- Resend OTP -->
      <div class="resend-section">
        <p class="resend-text">Didn't receive the code?</p>
        <a href="{% url 'resend_otp' %}" class="resend-link" id="resend-link">
          <i class="bi bi-arrow-clockwise me-1"></i>Resend OTP
        </a>
        <div class="timer-badge" id="timer-badge" style="display:none">
          <i class="bi bi-clock"></i><span id="timer-text">Resend in 60s</span>
        </div>
      </div>

      <a href="{% url 'login' %}" class="back-link">
        <i class="bi bi-arrow-left me-1"></i>Back to Login
      </a>

    </div>
  </div>
</div>

<script>
/* OTP Input Handler */
(function() {
  var inputs = document.querySelectorAll('.otp-input');

  inputs.forEach(function(input, i) {
    input.addEventListener('input', function(e) {
      var val = e.target.value.replace(/\D/g, '');
      e.target.value = val;
      if (val && i < inputs.length - 1) {
        inputs[i + 1].focus();
      }
      if (val) e.target.classList.add('filled');
      else e.target.classList.remove('filled');
      updateHiddenOtp();
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !e.target.value && i > 0) {
        inputs[i - 1].focus();
        inputs[i - 1].value = '';
        inputs[i - 1].classList.remove('filled');
      }
    });

    // Handle paste
    input.addEventListener('paste', function(e) {
      e.preventDefault();
      var pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
      for (var j = 0; j < Math.min(pasted.length, 6); j++) {
        inputs[j].value = pasted[j];
        inputs[j].classList.add('filled');
      }
      if (pasted.length >= 6) inputs[5].focus();
      else if (pasted.length > 0) inputs[Math.min(pasted.length, 5)].focus();
      updateHiddenOtp();
    });
  });

  function updateHiddenOtp() {
    var otp = '';
    inputs.forEach(function(inp) { otp += inp.value; });
    document.getElementById('otp-hidden').value = otp;
  }

  // Form submit
  document.getElementById('otp-form').addEventListener('submit', function(e) {
    updateHiddenOtp();
    var otp = document.getElementById('otp-hidden').value;
    if (otp.length !== 6) {
      e.preventDefault();
      alert('Please enter the complete 6-digit OTP.');
      return;
    }
    var btn = document.getElementById('verify-btn');
    btn.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Verifying…';
    btn.disabled = true;
  });

  // Resend cooldown timer
  var resendLink = document.getElementById('resend-link');
  var timerBadge = document.getElementById('timer-badge');
  var timerText = document.getElementById('timer-text');
  var cooldown = 60;
  var lastResend = sessionStorage.getItem('lastResend');

  if (lastResend) {
    var elapsed = Math.floor((Date.now() - parseInt(lastResend)) / 1000);
    if (elapsed < cooldown) {
      startCooldown(cooldown - elapsed);
    }
  }

  resendLink.addEventListener('click', function(e) {
    sessionStorage.setItem('lastResend', Date.now().toString());
  });

  function startCooldown(remaining) {
    resendLink.style.display = 'none';
    timerBadge.style.display = 'inline-flex';
    var interval = setInterval(function() {
      remaining--;
      timerText.textContent = 'Resend in ' + remaining + 's';
      if (remaining <= 0) {
        clearInterval(interval);
        resendLink.style.display = 'inline';
        timerBadge.style.display = 'none';
        sessionStorage.removeItem('lastResend');
      }
    }, 1000);
  }
})();
</script>
</body>
</html>
